# --- Observaciones cualitativas adicionales ---
observaciones: |
  - Es la única herramienta que empaqueta la aplicación con Docker Compose
    de forma automática, sin haberlo pedido el prompt.
  - Es la única cuyo package.json declara "nodemailer": "^9.0.3", una versión
    que no existe en el registro de npm (nodemailer va por la 6.x/7.x). En
    la instalación real npm resuelve al último release de nodemailer 6.
    Documentado como observación, no como hallazgo.
  - Comparte con Google AI Studio (GS-F001) y Cursor (CU-F001) el patrón de
    secreto de firma predecible, y con GS-F002 y CU-F003 el patrón de fuga
    del enlace de recuperación de contraseña en la respuesta de la API.
  - Es la única herramienta cuya longitud mínima de contraseña (8 caracteres)
    supera el umbral de 6 observado en el resto.
