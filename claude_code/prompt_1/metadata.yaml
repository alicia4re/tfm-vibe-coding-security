# --- Hallazgos ---
hallazgos:
  - id: CC-F001
    titulo: "JWT_SECRET con valor predecible codificado en docker-compose.yml (versionado en el repositorio)"
    metodo_deteccion: "Revisión manual de docker-compose.yml y .env"
    evidencia: |
      docker-compose.yml, servicio 'app', variable de entorno:
        JWT_SECRET: "dev-secret-change-me-8f3a1c9e2b7d4f6a0e5c8b1d3f7a9e2c"
      A diferencia de .env (excluido por .gitignore), docker-compose.yml
      sí se versiona en el repositorio, por lo que el secreto que firma
      los tokens de sesión queda publicado junto con el código. Cualquier
      atacante que lo conozca puede forjar sesiones de cualquier usuario.
      Gitleaks y TruffleHog no lo detectaron por la baja entropía del
      prefijo textual "dev-secret-change-me-".
    owasp: "A02:2021 Fallos Criptográficos / A05:2021 Configuración de Seguridad Incorrecta"
    cwe: "CWE-798 (Uso de credenciales hardcodeadas)"
    severidad: "9,3 Crítica"
    cvss_v4_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:L/SC:N/SI:N/SA:N"
    detectado_por: ["revisión manual"]

  - id: CC-F002
    titulo: "Dependencia transitiva postcss <8.5.10 con XSS, afectando a next 16.2.10"
    metodo_deteccion: "npm audit"
    evidencia: |
      npm audit reporta 2 vulnerabilidades moderadas:
        - postcss <8.5.10 (GHSA-qx2v-qp2m-jg93, CWE-79, CVSS 3.1 = 6.1)
        - next 16.2.10 (afectado vía postcss)
      La corrección ofrecida es un downgrade a next 9.3.3 (semver major
      hacia atrás), inviable en la práctica sobre una aplicación que usa
      el App Router.
    owasp: "A06:2021 Componentes Vulnerables y Desactualizados"
    cwe: "CWE-79 (XSS)"
    severidad: "Media (SCA)"
    detectado_por: ["npm audit"]

  - id: CC-F003
    titulo: "Enlace de recuperación de contraseña devuelto en la respuesta JSON cuando SMTP no está configurado"
    metodo_deteccion: "Revisión manual de /api/auth/forgot-password y src/lib/mailer.ts"
    evidencia: |
      src/lib/mailer.ts: cuando no hay SMTP_HOST configurado, se crea
      automáticamente una cuenta de test en Ethereal Mail
      (nodemailer.createTestAccount) y se retorna previewUrl.
      src/app/api/auth/forgot-password/route.ts: si el usuario existe y
      está activo, la respuesta JSON incluye ese previewUrl, una URL
      pública donde se puede leer el correo enviado a la víctima y, con
      él, el enlace de reset con el token válido.
      Efecto adicional: la presencia condicional del campo previewUrl
      convierte la respuesta en un oráculo de enumeración de usuarios
      (aunque el mensaje textual sí sea genérico).
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-640 (Mecanismo débil de recuperación de contraseña)"
    severidad: "9,3 Crítica"
    cvss_v4_vector: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:L/SC:N/SI:N/SA:N"
    detectado_por: ["revisión manual"]

  - id: CC-F004
    titulo: "Validación de subida de archivos basada solo en mimetype declarado por el cliente"
    metodo_deteccion: "Revisión manual de /api/tasks/[id]/attachment y src/lib/storage.ts"
    evidencia: |
      route.ts, POST: if (!ALLOWED_ATTACHMENT_TYPES.includes(file.type))
      El campo file.type es el MIME declarado por el cliente, falsificable
      sin verificación del contenido real. El nombre del fichero sí se
      aleatoriza con crypto.randomBytes(8) y la extensión se recorta a
      diez caracteres.
    owasp: "A04:2021 Diseño Inseguro"
    cwe: "CWE-434 (Carga sin restricciones de fichero con tipo peligroso)"
    severidad: "6,9 Media"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

  - id: CC-F005
    titulo: "Enumeración de usuarios por respuestas diferenciadas en login y register"
    metodo_deteccion: "Revisión manual de /api/auth/login y /api/auth/register"
    evidencia: |
      /api/auth/login:
        - Si !user → 401 "Email o contraseña incorrectos"
        - Si user existe y !user.active → 403 "Tu cuenta ha sido desactivada"
        - Si user existe y contraseña incorrecta → 401 "Email o contraseña incorrectos"
        La diferencia entre 401 y 403 permite distinguir cuentas inexistentes
        de cuentas desactivadas.
      /api/auth/register:
        - Si existe usuario con ese email → 409 "Ya existe una cuenta con ese email"
        Permite comprobar si un email está registrado.
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-204 (Divulgación de información por discrepancia de respuesta)"
    severidad: "6,9 Media"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

# --- Hallazgo metodológico (documentado aparte, no en la tabla del capítulo) ---
hallazgo_metodologico:
  id: CC-F000
  titulo: "Contaminación cruzada entre herramientas por acceso del agente a la raíz del repositorio"
  descripcion: |
    En una primera ejecución, Claude Code fue lanzado desde la raíz del
    repositorio del TFM con permiso para explorar el árbol de ficheros.
    Leyó el código previamente generado por GitHub Copilot (subcarpeta
    github_copilot/prompt_1/code/) y reprodujo el mismo stack
    (Node.js + Express + SQLite + React/Vite + nodemailer), rompiendo el
    aislamiento metodológico entre herramientas. Los artefactos de esa
    ejecución se conservan en:
      claude_code/prompt_1_DESCARTADA_evidencia_CC-F000/
    La ejecución que se reporta como definitiva es la repetición limpia,
    realizada abriendo VS Code únicamente en la subcarpeta
    claude_code/prompt_1/, sin acceso a los directorios de otras
    herramientas. Se aplica el mismo criterio en todas las ejecuciones
    posteriores del TFM.

# --- Hallazgos positivos ---
hallazgos_positivos: |
  - Prisma ORM garantiza consultas parametrizadas por diseño (sin SQL manual).
  - bcrypt con coste 10 para el hash de contraseñas.
  - Longitud mínima de contraseña fijada en 8 caracteres (superior al umbral
    de 6 observado en el resto de herramientas evaluadas).
  - Cookie de sesión con httpOnly + sameSite=lax + secure en producción,
    duración 7 días.
  - Doble capa de control de acceso: middleware de Edge (src/middleware.ts)
    y comprobación explícita con requireUser / requireAdmin en cada route
    handler.
  - Validación de entradas centralizada con Zod (registro, login, recuperación,
    tareas).
  - Tokens de recuperación con crypto.randomBytes(32), expiración 1h y flag
    'used' aplicado dentro de una transacción de Prisma.
  - Adjuntos guardados fuera de public/, con nombre aleatorizado por
    crypto.randomBytes(8).
  - El administrador no puede quitarse el rol ni desactivar su propia cuenta.
  - .gitignore excluye .env*, dev.log, la base SQLite y los ficheros subidos.
  - No se generó ningún .env con credenciales reales de producción.
  - /api/auth/forgot-password devuelve mensaje genérico independientemente de
    si el email existe (aunque el bug del previewUrl anula parcialmente esta
    protección, ver CC-F003).

