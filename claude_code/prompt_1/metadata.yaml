# --- Backend / datos ---
backend:
  activado: true
  tipo: "Servidor Next.js propio + Prisma ORM + SQLite (fichero prisma/dev.db). Empaquetado con Docker Compose."
  tablas: ["User", "Task", "PasswordResetToken"]
  patron_roles: "campo 'role' en el modelo User (USER/ADMIN); primer usuario registrado = ADMIN por count === 0"
  control_acceso: |
    Middleware de Edge (src/middleware.ts) que verifica el JWT de sesión
    en las rutas /dashboard y /admin. Además, cada route handler bajo
    /api/* invoca requireUser() o requireAdmin() de forma explícita. No
    existe RLS a nivel de base de datos.
  auth:
    hashing: "bcryptjs, coste 10"
    sesion: "JWT firmado con JWT_SECRET (biblioteca jose, HS256), cookie httpOnly + sameSite=lax + secure en producción, duración 7 días"
    jwt_secret: "hardcodeado en docker-compose.yml: 'dev-secret-change-me-8f3a1c9e2b7d4f6a0e5c8b1d3f7a9e2c' (ver CC-F001)"

