# --- Entorno ---
entorno:
  modelo: "Composer 2.5 Fast"
  interfaz: "cursor-app"        # Cursor como IDE independiente (no extensión en VS Code)
  workspace: "C:/Master Ciberseguridad/25-26/TFM/tfm-vibe-coding-security/cursor/prompt_2/"
  plan: "gratuito"
  version_herramienta: "0.44.x"  # confirmar en Ayuda > Acerca de
