  - fecha: "2026-06-24"
    inicio: "20:38:00+02:00"
    fin: "20:44:00+02:00"
    minutos: 5.02              
    creditos_consumidos: "no aplica (Copilot Chat no expone consumo por créditos en la UI)"
    notas: |
      notas: 
      Turno 1 (4:27): generación completa a partir de un único prompt, sin
      preguntas de vuelta. Copilot ejecutó en modo Agent y seleccionó como
      stack Node.js + Express + EJS (SSR) + SQLite + express-session
      (almacén SQLite) + Nodemailer + Multer. No creó ficheros .env con
      credenciales reales, solo .env.example con placeholders.
      Turno 2: al ejecutar npm start, cualquier petición devolvía error 500
      por sintaxis EJS obsoleta (`<% include %>`, eliminada desde EJS 3.0.0)
      en views/partials/header.ejs, pese a declarar ejs ^3.1.10 en
      package.json. Copilot corrigió la sintaxis a
      `<%- include('partials/messages') %>`, pero mantuvo la misma ruta
      relativa.
      Turno 3: la sintaxis ya era correcta, pero la ruta 'partials/messages'
      escrita desde dentro de views/partials/header.ejs resolvía a
      views/partials/partials/messages.ejs (inexistente), produciendo un
      segundo error ("Could not find the include file"). Copilot corrigió
      la ruta a 'messages' (fichero hermano). Tras este segundo fix la app
      arrancó sin errores y /login renderizó correctamente.
      Turnos 2 y 3 juntos: 0:34 según Toggl (no se registró por separado).

