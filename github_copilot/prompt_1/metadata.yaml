      El panel "Security Audit" de Bolt reporta 8 avisos (warnings), todos
      del tipo "Public/Signed-In Users Can Execute SECURITY DEFINER Function"
      sobre handle_new_user, is_admin, task_counts_by_status y user_task_stats.
      No marca ningún hallazgo como crítico.

