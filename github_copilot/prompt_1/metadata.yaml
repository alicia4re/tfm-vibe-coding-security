# --- Hallazgos ---
hallazgos:
  - id: GC-F001
    titulo: "Cookie de sesión (express-session) sin flags de seguridad configurados"
    metodo_deteccion: "Semgrep (6 reglas, misma línea de código)"
    evidencia: |
      La llamada a express-session() en app.js (líneas 25-31) no configura
      name, domain, expires, httpOnly, path ni secure. Usa el nombre de
      cookie por defecto (connect.sid) y no marca la cookie como HttpOnly
      ni Secure, lo que la expone a robo vía XSS o a envío sobre HTTP.
    owasp: "A05:2021 Configuración de Seguridad Incorrecta"
    cwe: "CWE-522 (Credenciales insuficientemente protegidas) — clasificación asignada por el propio Semgrep"
    severidad: "media"
    detectado_por: ["Semgrep"]
    notas: |
      6 reglas distintas de Semgrep (p/r2c-security-audit, familia
      express-cookie-settings) apuntan todas a la misma llamada; se
      documenta como un único hallazgo, no seis.

  - id: GC-F002
    titulo: "nodemailer con múltiples CVE conocidas, incluida inyección CRLF relevante para el flujo de recuperación de contraseña"
    metodo_deteccion: "npm audit"
    evidencia: |
      nodemailer es dependencia directa (usada en el flujo de "olvidé mi
      contraseña"). La versión instalada acumula 8 CVE: inyección CRLF en
      cabeceras SMTP y en cabeceras List-* (CWE-93), DoS por recursión en
      el parser de direcciones (CWE-703, CVSS 7.5), validación insuficiente
      de certificado TLS en OAuth2 (CWE-295), y bypass de
      disableFileAccess/disableUrlAccess permitiendo lectura de fichero y
      SSRF (CWE-73/918, CVSS 7.1). El resto de paquetes vulnerables
      (node-gyp, tar, cacache, make-fetch-happen, http-proxy-agent,
      @tootallnate/once, sqlite3) son cadena de compilación nativa de
      sqlite3, usados solo al instalar, no en el servidor en ejecución.
    owasp: "A06:2021 Componentes vulnerables y desactualizados"
    cwe: "CWE-93 (Neutralización inadecuada de CRLF)"
    severidad: "alta"
    detectado_por: ["npm audit"]
    notas: |
      Único paquete de los 8 flagged con relevancia real en producción;
      los otros 7 son herramientas de instalación de sqlite3, no alcanzables
      en tiempo de ejecución.

  - id: GC-F003
    titulo: "Validación de subida de archivos basada solo en mimetype declarado por el cliente"
    metodo_deteccion: "Revisión manual de app.js"
    evidencia: |
      El fileFilter de Multer (app.js, configuración de upload) acepta
      image/jpeg, image/png, image/gif y application/pdf comprobando
      únicamente file.mimetype, un valor que declara el propio cliente en
      la petición multipart y que puede falsificarse sin comprobar el
      contenido real del fichero. El nombre de archivo sí se sanea
      correctamente (regex que solo permite alfanuméricos, punto y guion).
    owasp: "A04:2021 Diseño Inseguro"
    cwe: "CWE-434 (Carga sin restricciones de fichero con tipo peligroso)"

    # --- Observaciones cualitativas adicionales ---
    observaciones: |
      - Turnos hasta app funcional: 3. Los dos fallos del turno 2 y 3 son
    fallos funcionales, no de seguridad (sintaxis EJS obsoleta primero,
    ruta de include relativa incorrecta después) — se documentan aquí, no
    como hallazgos GC-F00X.
