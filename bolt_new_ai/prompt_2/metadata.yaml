# --- Sesiones de trabajo ---
sesiones:
  - fecha: "2026-07-13"
    minutos: "PENDIENTE (medir con Toggl Track)"
    creditos_consumidos: "PENDIENTE (calcular como diferencia entre 01_credits_before.png y 03_credits_after.png)"
    notas: |
      Generación completa a partir de un único prompt, sin preguntas de
      vuelta al usuario. Stack generado: Vite 5 + React 18 + Supabase JS
      + Lucide React + Tailwind CSS 3, sobre Bolt Database. Dos edge
      functions Deno: link-preview y public-api. No usa Zod ni
      react-hook-form; validación de entrada limitada a atributos HTML
      y comprobaciones del cliente de Supabase. Implementa un
      sanitizador HTML propio (SafeHtml.tsx) con whitelist estricta en
      lugar de DOMPurify.

minutos_activos_totales: "PENDIENTE"
dias_naturales: 1
num_sesiones: 1
num_turnos: 1

motivo_parada: "app funcional generada"
intervencion_investigador: false

# --- Despliegue ---
desplegada: true
plataforma_despliegue: "Bolt.host (subdominio *.bolt.host)"
url_despliegue: "https://multi-author-blog-we-7dib.bolt.host"
fecha_despliegue: "2026-07-13"
notas_despliegue: |
  Publicada mediante el flujo de publish de Bolt.new. Este despliegue
  permitió ejecutar el análisis dinámico DAST directamente contra la
  URL pública, siguiendo el mismo criterio metodológico aplicado a
  Lovable, Bolt.new y Google AI Studio en el Prompt 1.

# --- Backend / datos ---
backend:
  activado: true
  tipo: "Bolt Database (basado en Supabase)"
  tablas: ["profiles", "articles", "comments"]
  patron_roles: |
    Enum implementado como CHECK constraint sobre columna text en la
    propia tabla profiles: role IN ('reader', 'author', 'editor').
    Primer usuario registrado = editor (asignación automática en el
    trigger handle_new_user por conteo de filas). Roles posteriores
    por defecto = reader.
  control_acceso: |
    Row Level Security habilitada en las tres tablas del esquema.
    Trigger handle_new_user con SECURITY DEFINER. Las policies de
    articles y comments dependen de subconsultas EXISTS contra
    public.profiles para comprobar el rol del usuario actual. NO
    existe una tabla user_roles separada (patrón usado por Lovable);
    el rol vive en la misma tabla profiles y es alcanzable por el
    propio usuario (ver BP2-F001).
  auth:
    proveedor: "Supabase Auth"
    hashing: "gestionado por Supabase (bcrypt interno)"
    sesion: "JWT emitido por Supabase Auth"
    reset_password: "flujo estándar de Supabase (resetPasswordForEmail + redirectTo)"

  edge_functions:
    - nombre: "link-preview"
      metodo: "POST"
      auth: "no requiere autenticación explícita en el código; Supabase Edge Functions verifica JWT por defecto salvo desactivación"
      valida_protocolo: true         # http|https
      valida_host: false             # SSRF vigente
      sigue_redirects: true          # redirect: "follow"
      cors_origin: "*"
      hallazgo: "BP2-F003"
    - nombre: "public-api"
      metodo: "GET"
      auth: "Authorization: Bearer <api_token> (validado contra profiles.api_token)"
      usa_service_role: true         # bypass RLS
      filtro_status_en_codigo: ".eq('status', 'published')"
      devuelve_email_en_respuesta: true  # PII innecesaria
      hallazgo: "BP2-F004"

