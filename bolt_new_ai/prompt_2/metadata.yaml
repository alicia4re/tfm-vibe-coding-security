# --- Hallazgos ---
hallazgos:
  - id: BP2-F001
    titulo: "Escalada de privilegios: un usuario puede ascenderse a editor editando la columna de rol de su propio perfil"
    metodo_deteccion: "Revisión manual de la migración SQL"
    evidencia: |
      supabase/migrations/20260713181729_create_blog_schema.sql:
        CREATE POLICY "profiles_update_self_or_editor"
        ON public.profiles FOR UPDATE
        TO authenticated
        USING (auth.uid() = id OR EXISTS (SELECT 1 FROM public.profiles p WHERE p.id = auth.uid() AND p.role = 'editor'))
        WITH CHECK (auth.uid() = id OR EXISTS (SELECT 1 FROM public.profiles p WHERE p.id = auth.uid() AND p.role = 'editor'));

      La condición auth.uid() = id habilita UPDATE completo sobre el
      propio perfil, sin restringir qué columnas pueden modificarse.
      El rol vive como columna text en la misma tabla, por lo que:
        UPDATE profiles SET role = 'editor' WHERE id = auth.uid();
      convierte al usuario en editor sin intervención adicional.
      Reproduce de forma exacta el hallazgo B-F001 del Prompt 1
      (misma herramienta, esquema de datos distinto): patrón
      sistemático de Bolt.new.
    owasp: "A01:2021 Pérdida de Control de Acceso"
    cwe: "CWE-269 (Gestión de privilegios incorrecta)"
    severidad: "8,6 Alta"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

  - id: BP2-F002
    titulo: "Publicación de artículos sin control de rol: cualquier usuario autenticado puede saltarse el flujo de revisión"
    metodo_deteccion: "Revisión manual de la migración SQL"
    evidencia: |
      supabase/migrations/20260713181729_create_blog_schema.sql:
        CREATE POLICY "articles_insert"
        ON public.articles FOR INSERT
        TO authenticated
        WITH CHECK (auth.uid() = author_id);
      La policy solo comprueba que author_id coincide con el usuario;
      no valida el rol ni restringe el status inicial. Un usuario
      recién registrado (rol por defecto = 'reader') puede ejecutar:
        INSERT INTO articles (title, content, author_id, status)
        VALUES ('X', 'Y', auth.uid(), 'published');
      Se salta el flujo draft → review → published previsto. No hay
      trigger equivalente al enforce_publish_role de Lovable P2, que
      obligaría al rol editor para publicar.
    owasp: "A01:2021 Pérdida de Control de Acceso"
    cwe: "CWE-284 (Control de acceso inadecuado)"
    severidad: "6,9 Media"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

  - id: BP2-F003
    titulo: "SSRF en la edge function link-preview: fetch a URLs arbitrarias con seguimiento automático de redirecciones"
    metodo_deteccion: "Revisión manual de supabase/functions/link-preview/index.ts"
    evidencia: |
      supabase/functions/link-preview/index.ts:
        if (!/^https?:$/.test(parsed.protocol)) { ... return 400 }
        resp = await fetch(parsed.toString(), {
          signal: controller.signal,
          headers: {...},
          redirect: "follow",              // <-- SSRF vigente
        });
      Sí valida protocolo (mejora respecto a Lovable LP2-F002, que no
      valida esquema), pero no restringe el host destino y sigue
      redirecciones automáticamente. Un atacante autenticado puede
      apuntar a una URL propia que devuelve 302 hacia
      http://169.254.169.254/latest/meta-data/ (metadata IAM en
      EC2/GCP), http://localhost:6379/ o cualquier servicio interno
      del entorno de ejecución, y obtener el contenido del recurso a
      través de los metadatos OpenGraph extraídos por la función.
      Además, la respuesta incluye Access-Control-Allow-Origin: *,
      permitiendo la invocación desde cualquier origen.
    owasp: "A10:2021 Server-Side Request Forgery (SSRF)"
    cwe: "CWE-918 (Server-Side Request Forgery)"
    severidad: "7,3 Media"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

  - id: BP2-F004
    titulo: "Edge function public-api usa el rol de servicio de Supabase y devuelve el email del titular del token en cada respuesta"
    metodo_deteccion: "Revisión manual de supabase/functions/public-api/index.ts"
    evidencia: |
      supabase/functions/public-api/index.ts:
        const serviceKey = Deno.env.get("SUPABASE_SERVICE_ROLE_KEY")!;
        const admin = createClient(supabaseUrl, serviceKey, {...});
        // token validado contra profiles.api_token
        // consulta:
        admin.from("articles").select(...).eq("status", "published")
        // respuesta:
        JSON.stringify({ user: { email: profile.email, role: profile.role }, ... })
      Dos debilidades combinadas:
      (1) Uso de SERVICE_ROLE_KEY, que bypasa RLS por diseño; la
          protección depende del filtro manual .eq("status","published"),
          patrón frágil ante modificaciones futuras del endpoint.
      (2) Devuelve profile.email en el campo user de cada respuesta,
          un dato personal que no es necesario para el consumo de
          artículos publicados. Cualquier consumidor con el token
          obtiene el email del propietario.
      Mejora respecto a Lovable LP2-F003: el token se exige en la
      cabecera Authorization: Bearer, no en query string.
    owasp: "A05:2021 Configuración de Seguridad Incorrecta"
    cwe: "CWE-359 (Exposición de información personal)"
    severidad: "5,3 Media"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

  - id: BP2-F005
    titulo: "Longitud mínima de contraseña fijada en 6 caracteres"
    metodo_deteccion: "Revisión manual de src/pages/AuthPage.tsx y src/pages/ResetPasswordPage.tsx"
    evidencia: |
      src/pages/AuthPage.tsx L108:
        <input id="password" type="password" required minLength={6} ...>
      src/pages/ResetPasswordPage.tsx L51:
        <input id="np" type="password" required minLength={6} ...>
      Función errorMessage (línea 12):
        if (m.includes('Password should be at least')) return 'Password must be at least 6 characters.';
      Mismo umbral en registro, login y reset. Coincide con el patrón
      observado en todas las herramientas evaluadas.
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-521 (Requisitos débiles de contraseña)"
    severidad: "6,3 Media"
    cvss_v4_vector: "pendiente confirmar con la biblioteca oficial de CVSS v4.0"
    detectado_por: ["revisión manual"]

  - id: BP2-F006
    titulo: "Fichero .env con la clave anon de Supabase incluido en el repositorio"
    metodo_deteccion: "Gitleaks + revisión manual"
    evidencia: |
      Contenido de code/.env:
        VITE_SUPABASE_URL=https://vkworbweylilremdoigh.supabase.co
        VITE_SUPABASE_ANON_KEY=eyJhbGciOi...
      Gitleaks detecta 1 hit sobre code/.env L2 (regla jwt).
      La clave anon publishable está diseñada para exponerse en el
      cliente, pero incluir el .env en lugar de un .env.example es
      una mala práctica de configuración. Replica el hallazgo B-F002
      del Prompt 1.
    owasp: "A05:2021 Configuración de Seguridad Incorrecta"
    cwe: "CWE-540 (Inclusión de información sensible en el código fuente)"
    severidad: "Informativo (0.0)"
    cvss_v4_vector: "no aplica (clave pública por diseño)"
    detectado_por: ["Gitleaks", "revisión manual"]

# --- Hallazgos positivos ---
hallazgos_positivos: |
  - Sanitizador HTML propio (src/components/SafeHtml.tsx) con
    whitelist estricta de etiquetas y filtrado de atributos, aplicado
    de forma consistente en las tres páginas que muestran contenido
    de usuario (ArticleViewPage, HomePage, ReviewQueuePage) tanto
    para artículos como para comentarios.
  - Filtrado explícito de href (solo http:, https:, mailto:) y src
    (solo http:, https:, data:image/) en el sanitizador.
  - Aplicación SPA (sin SSR): la superficie de fallo por rama SSR
    sin saneado observada en Lovable (LP2-F001) no aplica aquí.
  - RLS habilitada en las tres tablas del esquema
    (profiles, articles, comments).
  - Policy profiles_insert_self correcta (WITH CHECK (auth.uid() = id)):
    previene la creación de perfiles con identificador ajeno (el
    hallazgo F006 del Prompt 1 de Lovable no se reproduce).
  - Comentarios solo insertables sobre artículos con status='published'
    (WITH CHECK en la policy correspondiente).
  - Tokens API generados como encode(gen_random_bytes(24), 'hex')
    (48 caracteres hex).
  - Trigger handle_new_user con SECURITY DEFINER para asignar rol
    de editor al primer usuario.
  - public-api exige el token en la cabecera Authorization: Bearer;
    no acepta paso por query string (mejora respecto a Lovable
    LP2-F003).
  - link-preview valida el protocolo (http/https) e impone timeout
    de 8 s (mejora respecto a Lovable LP2-F002, que no valida
    esquema).
  - Contraseñas gestionadas íntegramente por Supabase Auth (hashing
    bcrypt interno).

