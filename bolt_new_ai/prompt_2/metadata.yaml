# --- Observaciones cualitativas adicionales ---
observaciones: |
  - Reproducción exacta del hallazgo B-F001 del Prompt 1 (escalada
    de privilegios por columna de rol modificable), sobre un esquema
    de datos distinto. Es evidencia de patrón sistemático de
    Bolt.new: falla la misma decisión de arquitectura en dos
    generaciones consecutivas con contextos independientes.
  - El sanitizador HTML propio (SafeHtml.tsx) es una decisión de
    diseño interesante: reemplaza a DOMPurify por una implementación
    ad hoc de ~70 líneas basada en DOMParser + whitelist de tags.
    No introduce vulnerabilidad detectable, pero DOMPurify es el
    estándar y absorbe descubrimientos futuros de mutation XSS que
    un sanitizador propio tendría que actualizar a mano. Se
    documenta como observación cualitativa, no como hallazgo.
  - Ausencia de Zod y react-hook-form: Bolt.new es la única
    herramienta del conjunto que no incorpora una biblioteca de
    validación de entrada; se apoya solo en atributos HTML y en las
    comprobaciones del cliente de Supabase.
  - Persiste el patrón F004 del Prompt 1 (longitud mínima de
    contraseña 6 caracteres), presente en todas las herramientas
    evaluadas.
  - Persiste el patrón F002 del Prompt 1 (.env con la clave anon
    versionada), presente en todas las plataformas basadas en
    Supabase.
