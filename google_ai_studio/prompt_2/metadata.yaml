# --- Despliegue ---
desplegada: true
plataforma_despliegue: "Google Cloud Run (europe-west2)"
url_despliegue: "https://mesa-redonda-968838359811.europe-west2.run.app"
fecha_despliegue: "2026-07-13"
notas_despliegue: |
  Publicada con el botón Publish de AI Studio, que despliega automáticamente
  en Google Cloud Run dentro del nivel gratuito. Nombre de la app: mesa-redonda.

# --- Backend / datos ---
backend:
  activado: true
  tipo: "Firebase (Cloud Firestore + Firebase Authentication) más servidor Express propio"
  colecciones_firestore: ["users", "articles", "comments"]
  patron_roles: |
    Campo 'role' en el documento de la colección users. Valores posibles:
    'lector', 'autor', 'editor'. El primer usuario que se registra es
    promovido a 'editor' automáticamente (regla implementada en el cliente:
    AuthModal.tsx comprueba si la colección users está vacía).
  control_acceso: |
    Se ejerce mediante Firestore Security Rules (firestore.rules). Dos
    funciones auxiliares: isEditor() e isAuthor() consultan el documento de
    users para determinar el rol. NO se usan custom claims de Firebase
    Authentication; el rol vive en Firestore.
  proyecto_firebase:
    projectId: "seventh-polygon-s40ks"
    firestoreDatabaseId: "ai-studio-da4711dc-3bc9-4aea-87ad-4d3c67cb7ada"
  auth:
    proveedor: "Firebase Authentication (email/password)"
    hashing: "gestionado por Firebase Authentication (bcrypt/scrypt internos)"
    sesion: "gestionada por Firebase Authentication (idToken + refreshToken)"
    longitud_minima_password: 6

# --- Servidor Express (server.ts) ---
servidor_express:
  puerto: 3000
  endpoints:
    - "GET /api/link-preview?url=<url>  (scraping de metadatos OG)"
    - "GET /api/published-articles      (API pública, requiere apiToken)"
  dependencias_relevantes:
    - "express 4.21.2"
    - "cheerio 1.2.0"
    - "firebase 12.16.0 (SDK cliente, inicializado también en el servidor)"

# --- GitHub ---
github:
  repo_url: "https://github.com/alicia4re/tfm-vibe-coding-security"
  ruta_en_repo: "google_ai_studio/prompt_2/"
  notas: "Código exportado como ZIP desde AI Studio y copiado a la ruta indicada."

# --- Pipeline de análisis ejecutado ---
analisis:
