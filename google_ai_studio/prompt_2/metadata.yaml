# Fecha de creación: 2026-07-13

herramienta: Google AI Studio
plan: free
version_herramienta: "modo de creación de apps (Build)"
modelo_subyacente: "Gemini (versión mostrada por AI Studio en la sesión)"
framework: "React 19"
proveedor_backend: "Firebase (Cloud Firestore + Firebase Authentication) + servidor Express propio para link-preview y API pública"
prompt_id: 2
fichero_prompt: "../../prompts/prompt_2.md"

# --- NOTA IMPORTANTE SOBRE FIREBASE ---
nota_firebase: |
  A diferencia del Prompt 1 (que generó un backend Express con persistencia en
  fichero JSON), en el Prompt 2 la herramienta sí activó la integración con
  Firebase. Solicitó confirmación al usuario para vincular el proyecto con
  Firebase; la investigadora la aceptó. El código generado incluye:
    - src/firebase.ts: inicialización del cliente Firebase (auth + Firestore).
    - firebase-applet-config.json: configuración pública del proyecto Firebase
      (projectId, apiKey, authDomain, appId, firestoreDatabaseId).
    - firestore.rules: reglas de seguridad de Firestore para las colecciones
      users, articles y comments.
  Además, se conserva un servidor Express (server.ts) que expone dos endpoints:
    - GET /api/link-preview (scraping de metadatos OG a partir de una URL).
    - GET /api/published-articles (API pública autenticada mediante apiToken).

