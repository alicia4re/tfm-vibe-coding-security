    reglas: "p/owasp-top-ten, p/r2c-security-audit (implícito), p/nodejs"
    ficheros_analizados: 25
    hallazgos: 1
    nota: "1 warning por dangerouslySetInnerHTML en ArticleView.tsx:240. 7 timeouts de análisis de taint."
  sca:
    herramienta: "npm audit"
    dependencias_analizadas: 402
    vulnerabilidades: 0
  secretos:
    herramientas: ["Gitleaks", "TruffleHog 3.95.5"]
    hallazgos_gitleaks: 1
    hallazgos_trufflehog: 1
    nota: |
      Ambas herramientas detectan la misma clave (apiKey de Firebase en
      firebase-applet-config.json). Gitleaks la clasifica como gcp-api-key.
      TruffleHog como GoogleGeminiAPIKey (mismo prefijo AIzaSy). Es la clave
      pública de Firebase, diseñada para exponerse en el cliente.
  dast:
