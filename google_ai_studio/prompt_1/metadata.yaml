# --- NOTA IMPORTANTE SOBRE FIREBASE ---
nota_firebase: |
  La documentación de Google describe integración con Firebase (Firestore,
  Firebase Auth, Cloud Storage). En esta generación NO se activó: la
  herramienta no preguntó nada sobre Firebase y generó un backend Express
  con persistencia en fichero JSON (data/db.json). Se documenta como
  hallazgo cualitativo, no como fallo de seguridad.

