# --- Observaciones cualitativas adicionales ---
observaciones: |
  - La integración con Firebase anunciada por Google no se activó en la
    generación real; la herramienta produjo un backend Express con
    persistencia en fichero JSON. Contradice la premisa inicial de
    comparar un modelo de seguridad basado en Firestore.
  - Es la única herramienta cuyo npm audit no reporta ninguna
    vulnerabilidad (no usa nodemailer).
  - Comparte con Cursor y Google AI Studio el patrón de secreto de firma
    hardcodeado (GS-F001 / CU-F001) y el de código de recuperación
    expuesto en la respuesta (GS-F002 / CU-F003).