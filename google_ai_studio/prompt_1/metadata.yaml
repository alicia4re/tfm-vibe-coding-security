# --- Hallazgos ---
hallazgos:
  - id: GS-F001
    titulo: "JWT_SECRET con valor predecible hardcodeado como fallback en server.ts"
    metodo_deteccion: "Revisión manual de server.ts"
    evidencia: |
      server.ts línea 14: const JWT_SECRET = process.env.JWT_SECRET ||
      "gestor-de-tareas-super-secreto-2026". Como la app no genera un .env
      real (solo .env.example con GEMINI_API_KEY y APP_URL), ese valor
      predecible es el que se usa siempre para firmar los tokens de sesión.
      Cualquier atacante que lo conozca puede forjar tokens de cualquier
      usuario. Gitleaks y TruffleHog no lo detectaron por su baja entropía.
    owasp: "A02:2021 Fallos Criptográficos"
    cwe: "CWE-798 (Uso de credenciales hardcodeadas)"
    severidad: "alta"
    detectado_por: ["revisión manual"]

  - id: GS-F002
    titulo: "Código de recuperación de contraseña devuelto en la respuesta JSON de la API"
    metodo_deteccion: "Revisión manual de server.ts (/api/auth/recover-password)"
    evidencia: |
      La ruta /api/auth/recover-password devuelve resetCode y simulatedMail
      en el cuerpo de la respuesta JSON (server.ts, comentario explícito:
      "We return this so the front-end can display a helper mock mail
      client or autofill it"). Un atacante podría solicitar el reset de
      cualquier email y obtener el código sin acceso al correo de la víctima.
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-640 (Mecanismo débil de recuperación de contraseña)"
    severidad: "media"
    detectado_por: ["revisión manual"]

  - id: GS-F003
    titulo: "Validación de subida de archivos basada solo en mimetype declarado por el cliente"
    metodo_deteccion: "Revisión manual de server.ts (configuración de Multer)"
    evidencia: |
      El fileFilter de Multer comprueba allowedTypes.includes(file.mimetype),
      un valor declarado por el cliente y falsificable. El nombre de archivo
      sí se aleatoriza (Date.now() + random).
    owasp: "A04:2021 Diseño Inseguro"
    cwe: "CWE-434 (Carga sin restricciones de fichero con tipo peligroso)"
    severidad: "baja"
    detectado_por: ["revisión manual"]

  - id: GS-F004
    titulo: "Longitud mínima de contraseña de 6 caracteres"
    metodo_deteccion: "Revisión manual de server.ts (/api/auth/register)"
    evidencia: |
      Registro: if (password.length < 6). Mismo umbral en reset-password.
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-521 (Requisitos débiles de contraseña)"
    severidad: "baja"
    detectado_por: ["revisión manual"]

# --- Hallazgos positivos ---
hallazgos_positivos: |
  - Sin motor SQL (base de datos en fichero JSON): no hay vector de
    inyección SQL.
  - bcrypt con coste 10 para el hash de contraseñas.
  - Todas las rutas de tareas protegidas con authenticateToken.
  - Rutas de administración protegidas adicionalmente con requireAdmin.
  - /recover-password no revela si el email existe (evita enumeración).
  - El admin no puede quitarse el rol si es el único administrador.
  - Códigos de recuperación con caducidad de 15 minutos.
  - No se generó .env con credenciales reales, solo .env.example.

