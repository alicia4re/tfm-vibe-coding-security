# --- Hallazgos ---
hallazgos:
  - id: CU-F001
    titulo: "AUTH_SECRET con valor predecible hardcodeado en .env"
    metodo_deteccion: "Revisión manual del fichero .env"
    evidencia: |
      El fichero .env contiene AUTH_SECRET="task-manager-dev-secret-change-in-production",
      un valor predecible que firma los tokens JWT de sesión de NextAuth.
      Cualquier atacante que lo conozca puede forjar sesiones de cualquier
      usuario. El .gitignore sí excluye .env*, por lo que no se versionaría
      en un repositorio normal, pero el fichero se genera con ese valor
      por defecto y la aplicación lo usa directamente. Gitleaks y TruffleHog
      no lo detectaron por su baja entropía (texto legible).
    owasp: "A02:2021 Fallos Criptográficos"
    cwe: "CWE-798 (Uso de credenciales hardcodeadas)"
    severidad: "alta"
    detectado_por: ["revisión manual"]

  - id: CU-F002
    titulo: "nodemailer con múltiples CVE conocidas"
    metodo_deteccion: "npm audit"
    evidencia: |
      nodemailer es dependencia directa (usada en el flujo de recuperación
      de contraseña). La versión instalada acumula 6 CVE: inyección CRLF
      en cabeceras SMTP (CWE-93), bypass de restricciones de acceso a
      ficheros (CWE-73/918, CVSS 7.1), validación insuficiente de
      certificado TLS en OAuth2 (CWE-295). Los restantes paquetes
      vulnerables (postcss, next, next-auth, @auth/core) son dependencias
      transitivas con CVE de severidad moderada.
    owasp: "A06:2021 Componentes vulnerables y desactualizados"
    cwe: "CWE-93 (Neutralización inadecuada de CRLF)"
    severidad: "alta"
    detectado_por: ["npm audit"]

  - id: CU-F003
    titulo: "Token de recuperación de contraseña devuelto en respuesta API cuando SMTP no está configurado"
    metodo_deteccion: "Revisión manual de src/app/api/auth/forgot-password/route.ts"
    evidencia: |
      Cuando SMTP no está configurado (estado por defecto de la app
      generada), la ruta /api/auth/forgot-password devuelve el token de
      recuperación directamente en el cuerpo de la respuesta JSON
      (campo resetUrl). Un atacante podría solicitar el reset de
      cualquier email y obtener el token sin acceso al correo de la
      víctima.
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-640 (Mecanismo débil de recuperación de contraseña)"
    severidad: "media"
    detectado_por: ["revisión manual"]

  - id: CU-F004
    titulo: "Validación de subida de archivos basada solo en mimetype declarado por el cliente"
    metodo_deteccion: "Revisión manual de src/app/api/tasks/[id]/attachment/route.ts"
    evidencia: |
      ALLOWED_TYPES.includes(file.type) comprueba el tipo MIME declarado
      por el cliente, un valor falsificable. El nombre de archivo sí se
      aleatoriza correctamente con randomUUID().
    owasp: "A04:2021 Diseño Inseguro"
    cwe: "CWE-434 (Carga sin restricciones de fichero con tipo peligroso)"
    severidad: "baja"
    detectado_por: ["revisión manual"]

  - id: CU-F005
    titulo: "Longitud mínima de contraseña de 6 caracteres"
    metodo_deteccion: "Revisión manual de src/lib/validations.ts"
    evidencia: |
      registerSchema define z.string().min(6, ...) para la contraseña.
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-521 (Requisitos débiles de contraseña)"
    severidad: "baja"
    detectado_por: ["revisión manual"]

# --- Hallazgos positivos (buenas prácticas observadas) ---
hallazgos_positivos: |
  - Prisma ORM: todas las consultas parametrizadas por diseño, sin
    posibilidad de inyección SQL.
  - bcrypt con coste 12 para el hash de contraseñas.
  - Validación de entradas centralizada con esquemas Zod para todos
    los formularios (registro, login, tareas, recuperación de contraseña).
  - /forgot-password devuelve el mismo mensaje independientemente de
    si el email existe, evitando enumeración de usuarios.
  - Nombres de ficheros subidos aleatorizados con UUID (previene path
    traversal y colisiones).
  - .gitignore excluye .env*.
  - El administrador no puede desactivar su propia cuenta.
  - Tokens de recuperación generados con crypto.randomBytes(32).
  - Comprobación de propiedad de tarea antes de cada operación
    (task.userId !== session.user.id).

