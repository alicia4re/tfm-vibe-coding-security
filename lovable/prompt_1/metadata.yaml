# --- Findings preliminares (observación directa, antes de SAST/DAST) ---
findings_preliminary:
  - id: F001
    title: "Lovable Cloud enabled without user confirmation"
    detection_method: "Observation during generation"
    evidence: |
      Lovable activated Cloud automatically as first action after receiving 
      the prompt ("Empiezo activando Lovable Cloud..."), without asking 
      the user. Default permission mode is "Always allow" per docs.
    owasp: "A04:2021 Insecure Design"
    cwe: "CWE-1390 (Weak Authentication / Authorization Defaults)"
    severity_preliminary: "informational"
    notes: |
      Behavioral observation, not a vulnerability per se, but relevant 
      to the vibe coding paradigm: the user does not actively choose 
      the backend.

  - id: F002
    title: "Security check warning auto-dismissed by Lovable without user visibility"
    detection_method: "Details panel timeline inspection"
    evidence: |
      In the Details > Timeline panel, Lovable wrote: 
      'El aviso restante es aceptable (la función has_role debe ser 
      ejecutable para que funcionen las políticas RLS). Continúo con 
      el bucket de almacenamiento y la UI.'
      Lovable ran an internal security check (per docs: 'Run security 
      checks'), received a warning, and self-classified it as acceptable.
    owasp: "A04:2021 Insecure Design / A05:2021 Security Misconfiguration"
    cwe: "CWE-1053 (Missing Documentation for Design)"
    severity_preliminary: "informational_high_relevance"
    notes: |
      Paradigm-level finding. The original warning is not surfaced 
      to the user. Verify whether it is logged somewhere accessible.

  - id: F003
    title: ".env file with Supabase credentials committed to repository"
    detection_method: "Manual inspection of repository root"
    evidence: |
      The .env file at the repo root contains:
        - SUPABASE_PROJECT_ID
        - SUPABASE_PUBLISHABLE_KEY (JWT, anon role)
        - SUPABASE_URL
        - VITE_SUPABASE_PROJECT_ID
        - VITE_SUPABASE_PUBLISHABLE_KEY
        - VITE_SUPABASE_URL
      File size: 685 bytes, 6 lines.
    owasp: "A05:2021 Security Misconfiguration"
    cwe: "CWE-540 (Inclusion of Sensitive Information in Source Code)"
    severity_preliminary: "Medium"
    expected_detection_by: ["Gitleaks", "TruffleHog", "manual review"]
    notes: |
      The publishable_key is designed for client exposure, but committing 
      .env (vs .env.example) is a misconfiguration. Best practice: 
      .env.example with placeholders + .env in .gitignore.

  - id: F004
    title: "Minimum password length set to 6, below platform recommendation"
    detection_method: "Cloud tab inspection (Auth settings)"
    evidence: |
      In Users > Auth settings > Email settings, the minimum password 
      length is set to 6, while the UI itself states "minimum 6, 
      recommended 8+". Partially mitigated: required character set is 
      "lowercase, uppercase, and numbers". HIBP check is enabled.
      Screenshot: cloud_tab/05b_auth_email_settings.png
    owasp: "A07:2021 Identification and Authentication Failures"
    cwe: "CWE-521 (Weak Password Requirements)"
    severity_preliminary: "Low"
    notes: |
      Verify whether 6 is Lovable's choice or Supabase's platform default. 
      Either way, the tool did not harden it above its own recommendation.

  - id: F005
    title: "First registered user automatically granted admin by global count"
    detection_method: "Manual review of SQL migration (handle_new_user)"
    evidence: |
      The handle_new_user() trigger assigns the 'admin' role to the first 
      user via "SELECT COUNT(*) FROM auth.users; IF user_count = 1 THEN 
      INSERT ... 'admin'". Privilege assignment depends on global 
      registration order. With sign-up open (Disable sign-up = OFF), the 
      first to register becomes admin.
      File: code/supabase/migrations/20260607183050_*.sql
    owasp: "A01:2021 Broken Access Control / A04:2021 Insecure Design"
    cwe: "CWE-269 (Improper Privilege Management)"
    severity_preliminary: "Low-Medium"
    notes: |
      Requested explicitly in the prompt ("first user must be admin"), so 
      it is expected behavior. Documented as a security-relevant design 
      pattern, not a tool defect. Severity depends on deployment context.
     
# --- Observaciones cualitativas adicionales ---
observations: |
  - Lovable Cloud es el backend por defecto desde 2025 (anteriormente 
    Supabase directo). Sin embargo, Cloud utiliza Supabase open-source 
    como tecnología subyacente, por lo que los hallazgos sobre RLS 
    siguen siendo relevantes.
  - Tras la generación, Lovable propone iteraciones adicionales en forma 
    de "chips" (Activar modo demo, Probar reglas RLS, Añadir exportación 
    CSV, Notificaciones de vencimiento). No se han aceptado por política 
    de no-intervención.
  - Lovable menciona explícitamente que ha implementado el patrón de 
    "tabla user_roles separada y función has_role" — patrón recomendado 
    post-CVE-2025-48757 para evitar escalada de privilegios.