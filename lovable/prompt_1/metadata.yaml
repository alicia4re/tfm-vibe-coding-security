# --- Observaciones cualitativas adicionales ---
observaciones: |
  - Lovable Cloud es el backend por defecto desde 2025 (anteriormente
    Supabase directo). Cloud utiliza Supabase open-source como tecnología
    subyacente, por lo que los hallazgos sobre RLS siguen siendo válidos y
    la sección 2.6 del TFM sigue aplicando.
  - Tras la generación, Lovable propone iteraciones adicionales en forma de
    "chips" (Probar reglas RLS, Añadir exportación CSV, Notificaciones de
    vencimiento). No se han aceptado por la política de no-intervención.