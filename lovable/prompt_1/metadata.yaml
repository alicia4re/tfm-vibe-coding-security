# --- Hallazgos ---
hallazgos:
  - id: F001
    titulo: "Lovable Cloud activado sin confirmación del usuario"
    metodo_deteccion: "Observación durante la generación"
    evidencia: |
      Lovable activó Cloud automáticamente como primera acción tras recibir
      el prompt ("Empiezo activando Lovable Cloud..."), sin preguntar al
      usuario. El modo de permisos por defecto es "Always allow" según
      la documentación.
    owasp: "A04:2021 Diseño Inseguro"
    cwe: "CWE-1390 (Valores por defecto débiles de autenticación/autorización)"
    severidad: "informativo"
    notas: |
      Observación de comportamiento, no una vulnerabilidad en sí, pero
      relevante para el vibe coding: el usuario no elige activamente el
      backend.

  - id: F002
    titulo: "Aviso de seguridad auto-descartado por Lovable sin visibilidad para el usuario"
    metodo_deteccion: "Inspección del panel Details > Timeline"
    evidencia: |
      En el panel Details > Timeline, Lovable escribió:
      'El aviso restante es aceptable (la función has_role debe ser
      ejecutable para que funcionen las políticas RLS). Continúo con
      el bucket de almacenamiento y la UI.'
      Lovable ejecutó una comprobación de seguridad interna, recibió un
      aviso y lo clasificó como aceptable por sí mismo.
    owasp: "A04:2021 Diseño Inseguro / A05:2021 Configuración de Seguridad Incorrecta"
    cwe: "CWE-1053 (Falta de documentación del diseño)"
    severidad: "informativo (alta relevancia)"
    notas: |
      Hallazgo de nivel de proceso. El aviso original no se muestra al
      usuario. El panel Security muestra "No issues found" pese a este
      aviso (captura cloud_tab/09_security.png). El aviso se resolvió en
      la migración de revocación de permisos (segundo fichero SQL), que
      revoca EXECUTE de has_role para anon: la mitigación existe, pero no
      es visible para el usuario.

  - id: F003
    titulo: "Fichero .env con credenciales de Supabase incluido en el repositorio"
    metodo_deteccion: "Gitleaks (2 coincidencias) + inspección manual"
    evidencia: |
      El fichero .env en la raíz del repositorio contiene:
        - SUPABASE_PROJECT_ID
        - SUPABASE_PUBLISHABLE_KEY (JWT, rol anon)
        - SUPABASE_URL
        - VITE_SUPABASE_PROJECT_ID
        - VITE_SUPABASE_PUBLISHABLE_KEY
        - VITE_SUPABASE_URL
      Tamaño: 685 bytes, 6 líneas.
      Gitleaks detectó 2 coincidencias (regla jwt, entropía 5.50) en las
      líneas 2 y 5. TruffleHog reportó 0 secretos (la clave publishable no
      es una credencial verificable para sus detectores). Semgrep no
      reporta este tipo de hallazgo de configuración.
    owasp: "A05:2021 Configuración de Seguridad Incorrecta"
    cwe: "CWE-540 (Inclusión de información sensible en el código fuente)"
    severidad: "media"
    detectado_por: ["Gitleaks", "revisión manual"]
    notas: |
      La publishable_key está diseñada para exponerse en el cliente, pero
      incluir el .env (en lugar de un .env.example) es una mala práctica de
      configuración. Buena práctica: .env.example con valores de ejemplo y
      .env en .gitignore. El commit lo realizó el bot gpt-engineer-app[bot]
      (no lovable-dev[bot]), con mensaje genérico "Changes".

  - id: F004
    titulo: "Longitud mínima de contraseña fijada en 6, por debajo de la recomendación de la plataforma"
    metodo_deteccion: "Inspección del Cloud tab (ajustes de autenticación)"
    evidencia: |
      En Users > Auth settings > Email settings, la longitud mínima de
      contraseña está fijada en 6, mientras que la propia interfaz indica
      "minimum 6, recommended 8+". Mitigado parcialmente: el conjunto de
      caracteres requeridos es "minúsculas, mayúsculas y números" y la
      comprobación HIBP (Have I Been Pwned) está activada.
      Captura: cloud_tab/05b_auth_email_settings.png
    owasp: "A07:2021 Fallos de Identificación y Autenticación"
    cwe: "CWE-521 (Requisitos débiles de contraseña)"
    severidad: "baja"
    notas: |
      Pendiente de verificar si el 6 es elección de Lovable o el valor por
      defecto de Supabase. En cualquier caso, la herramienta no lo endureció
      por encima de su propia recomendación.

  - id: F005
    titulo: "Escalada de privilegios: control de acceso de user_roles sin policy INSERT restrictiva"
    metodo_deteccion: "Scanner de seguridad de Lovable (al publicar). NO detectado por Semgrep ni por la revisión manual inicial"
    evidencia: |
      La tabla user_roles no define ninguna policy RLS que restrinja el
      INSERT a administradores. La policy "Admins manage roles" es FOR ALL
      con WITH CHECK de admin, pero al ser permisiva no bloquea por sí sola
      el INSERT de no-admin. Su protección efectiva depende únicamente de
      que el GRANT de tabla concede solo SELECT a authenticated
      ("GRANT SELECT ON public.user_roles TO authenticated"). Configuración
      frágil: ante cualquier ampliación del GRANT (patrón aplicado en
      profiles y tasks), un usuario autenticado podría insertar una fila
      asignándose el rol 'admin'.
      Fichero: code/supabase/migrations/20260607183050_*.sql
      Detectado por el scanner de Lovable como "Critical: Any authenticated
      user can grant themselves admin role".
    owasp: "A01:2021 Pérdida de Control de Acceso"
    cwe: "CWE-269 (Gestión inadecuada de privilegios)"
    severidad: "alta"
    notas: |
      Matización técnica: en el estado generado, el GRANT (solo SELECT)
      mitiga la explotación directa. El fallo es de defensa en profundidad:
      la capa RLS no protege user_roles, solo el GRANT. Hallazgo clave del
      TFM: ni el SAST ni la revisión manual lo detectaron; sí el scanner de
      la plataforma. Sustituye la formulación anterior de F005 (admin al
      primer usuario), que era comportamiento solicitado en el prompt.

  - id: F006
    titulo: "Ausencia de policy INSERT en profiles permite suplantación de perfiles"
    metodo_deteccion: "Scanner de seguridad de Lovable (al publicar)"
    evidencia: |
      La tabla profiles no tiene policy de INSERT definida, pero el GRANT sí
      concede INSERT a authenticated ("GRANT SELECT, INSERT, UPDATE, DELETE
      ON public.profiles TO authenticated"). Sin policy con
      WITH CHECK (auth.uid() = id), un usuario autenticado podría insertar
      perfiles con cualquier id, suplantando a otros usuarios. A diferencia
      de F005, aquí el GRANT no mitiga: el vector está abierto.
      Detectado como "Warning: No INSERT policy on profiles table allows
      uncontrolled profile creation".
    owasp: "A01:2021 Pérdida de Control de Acceso"
    cwe: "CWE-284 (Control de acceso inadecuado)"
    severidad: "media-alta"
    notas: |
      Lovable lo marca como warning, pero técnicamente el vector está más
      abierto que el crítico F005, porque profiles sí tiene INSERT en el
      GRANT. Inversión interesante para la discusión.

  - id: F007
    titulo: "Dependencia de servidor (@tanstack/start-server-core) con deserialización insegura de peticiones a server-functions"
    metodo_deteccion: "bun audit"
    evidencia: |
      @tanstack/start-server-core es dependencia directa de @tanstack/react-start
      (declarado en el registro de npm: react-start 1.167.50 depende de
      start-server-core 1.167.22), confirmado independientemente del registro
      público, no solo por la instalación local. GHSA-9m65-766c-r333: una petición
      entrante a una server-function podría invocar una función de servidor
      distinta a la esperada, por deserialización insegura.
    owasp: "A06:2021 Componentes vulnerables y desactualizados"
    cwe: "CWE-502 (Deserialización de datos no confiables)"
    severidad: "media"
    detectado_por: ["bun audit"]
    notas: |
      A diferencia del resto de paquetes con CVE en este proyecto (todos en
      devDependencies: babel, esbuild, vite, etc.), este forma parte del
      servidor Node que TanStack Start ejecuta en producción. Bolt.new, al ser
      un SPA sin servidor propio, no tiene equivalente — diferencia
      arquitectónica entre ambas herramientas, no solo de dependencias.

# --- Resultados del análisis dinámico (DAST) ---
dast:
  herramienta: "OWASP ZAP 2.17.0"
  fecha: "2026-06-22"
  url_objetivo: "https://task-keeper-deluxe.lovable.app"
  tipo_escaneo: "Escaneo automatizado (spider tradicional + ajax spider con Chrome Headless)"
  scan_policy: "Dev Standard"
  informe: "analysis/zap_report.html"
  total_alertas: 7
  alertas:
    - nombre: "Content Security Policy (CSP) no configurada"
      severidad: "media"
      instancias: 4
    - nombre: "Falta de cabecera Anti-Clickjacking"
      severidad: "media"
      instancias: 2
    - nombre: "Cookie con atributo SameSite a None"
      severidad: "baja"
      instancias: 3
    - nombre: "Divulgación de marcas de tiempo Unix"
      severidad: "informativa"
      instancias: 4
    - nombre: "Loosely Scoped Cookie"
      severidad: "informativa"
      instancias: 3
    - nombre: "Reexaminar las directivas de control de caché"
      severidad: "informativa"
      instancias: 2
    - nombre: "Respuesta de gestión de sesión identificada"
      severidad: "informativa"
      instancias: 4
  interpretacion: |
    ZAP detectó exclusivamente debilidades de capa web (cabeceras HTTP de
    seguridad ausentes y configuración de cookies), todas de severidad media
    o inferior. No detectó el fallo crítico de escalada de privilegios (F005),
    que reside en la lógica RLS del backend y no es visible para un escaneo
    dinámico no autenticado desde el exterior. Confirma que el DAST, por sí
    solo, no cubre la superficie de riesgo principal de esta aplicación.

# --- Hallazgos positivos (buenas prácticas observadas) ---
hallazgos_positivos: |
  - Políticas RLS habilitadas en las tres tablas (profiles, tasks,
    user_roles) y en storage.objects, usando has_role() de forma
    consistente. No obstante, la cobertura es incompleta: faltan policies
    INSERT restrictivas en user_roles y profiles (ver F005 y F006).
  - Patrón de roles recomendado post-CVE-2025-48757: tabla user_roles
    separada y función has_role con SECURITY DEFINER y search_path fijado.
  - Revocación explícita de EXECUTE: has_role no es ejecutable por anon;
    handle_new_user y set_updated_at revocadas para todos los roles de
    cliente (solo se ejecutan vía trigger).
  - Aislamiento de almacenamiento por carpeta de usuario en el bucket
    task-attachments (auth.uid() = primer segmento de la ruta).
  - Comprobación HIBP de contraseñas activada.
  - Confirmación de email obligatoria (Auto-confirm email desactivado).
  - Los secretos no se exponen en la UI (solo se muestran los nombres).

# --- Resultados del análisis estático (SAST) ---
sast:
  gitleaks:
    coincidencias: 2
    detalle: "Dos JWT (publishable key de Supabase) en .env, líneas 2 y 5. Confirma F003."
    informe: "analysis/gitleaks_report.json"
  trufflehog:
    coincidencias: 0
    detalle: |
      0 secretos verificados y 0 no verificados (111 chunks, 489568 bytes).
      Divergencia con Gitleaks: TruffleHog usa detectores de credenciales
      verificables; la clave anon de Supabase no encaja como secreto
      accionable. La divergencia es en sí un resultado relevante.
    informe: "analysis/trufflehog_report.json"
  semgrep:
    coincidencias: 0
    detalle: |
      95 reglas (p/owasp-top-ten, p/r2c-security-audit) sobre 90 ficheros,
      0 hallazgos. El código TypeScript/React no presenta patrones de
      vulnerabilidad. La seguridad reside en la configuración del backend
      (RLS, auth), fuera del alcance del SAST de código.
    informe: "analysis/semgrep_report.json"

