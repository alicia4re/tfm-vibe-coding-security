# --- Observaciones cualitativas adicionales ---
observaciones: |
  - El Prompt 2 se orienta a categorías OWASP complementarias a las
    cubiertas en el Prompt 1: contenido enriquecido por usuarios
    (potencial A03 XSS), API pública con token (potencial A01/A05),
    edge function con fetch de URL arbitraria (potencial A10 SSRF).
    Los tres vectores materializan en LP2-F001, LP2-F003 y LP2-F002
    respectivamente.
  - Lovable corrige por diseño el hallazgo F002 del Prompt 1: la
    segunda migración incluye REVOKE explícito sobre las funciones
    SECURITY DEFINER internas, mostrando aprendizaje entre iteraciones
    de prompt.
  - Persiste el patrón de F003 del Prompt 1: fichero .env con la
    clave publishable de Supabase incluido en el repositorio
    (LP2-F006).
  - Persiste el patrón de F004 del Prompt 1: longitud mínima de
    contraseña de 6 caracteres (LP2-F005).
  - La numeración de hallazgos salta de LP2-F003 a LP2-F005: LP2-F004
    se reservó inicialmente para el aviso ZAP de XSS y se reclasificó
    como falso positivo (LP2-FP001) tras la revisión manual del código
    de src/routes/auth.tsx.
